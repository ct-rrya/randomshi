<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>INTERCEPTOR — BG</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#00ff41;--g2:#00cc33;--g3:#008f11;--bg:#020802;}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;}

/* Layer 1: matrix canvas */
#matrix-canvas{position:fixed;inset:0;z-index:0;opacity:0.45;pointer-events:none;}

/* Layer 2: hex grid */
#hex-canvas{position:fixed;inset:0;z-index:1;opacity:0.22;pointer-events:none;}

/* Layer 3: noise grain */
.grain{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size:128px 128px;
  opacity:0.09;
  mix-blend-mode:overlay;
}

/* Layer 4: grid lines */
.grid-lines{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,255,65,0.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,65,0.06) 1px,transparent 1px);
  background-size:40px 40px;
}

/* Layer 5: vignette */
.vignette{
  position:fixed;inset:0;z-index:3;pointer-events:none;
  background:
    radial-gradient(ellipse at 50% 50%,transparent 35%,rgba(0,0,0,0.82) 100%),
    linear-gradient(to bottom,rgba(0,0,0,0.5) 0%,transparent 8%,transparent 92%,rgba(0,0,0,0.5) 100%);
}

/* Layer 6: scanlines */
.scanlines{
  position:fixed;inset:0;z-index:4;pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,transparent 0,transparent 2px,
    rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px
  );
}

/* Layer 7: sweep */
.sweep{
  position:fixed;left:0;right:0;z-index:3;pointer-events:none;
  height:3px;
  background:linear-gradient(90deg,transparent,rgba(0,255,65,0.28),transparent);
  animation:sweep 8s linear infinite;
  top:0;
}
@keyframes sweep{0%{top:-2%;opacity:0}5%{opacity:1}95%{opacity:1}100%{top:102%;opacity:0}}
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>
<canvas id="hex-canvas"></canvas>
<div class="grain"></div>
<div class="grid-lines"></div>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="sweep"></div>

<script>
// MATRIX RAIN
(function(){
  const c=document.getElementById('matrix-canvas');
  const ctx=c.getContext('2d');
  let W,H,cols,drops;
  const chars='01';
  function init(){W=c.width=innerWidth;H=c.height=innerHeight;cols=Math.floor(W/16);drops=Array(cols).fill(1);}
  init();addEventListener('resize',init);
  setInterval(()=>{
    ctx.fillStyle='rgba(2,8,2,0.07)';ctx.fillRect(0,0,W,H);
    ctx.font='14px Share Tech Mono';
    for(let i=0;i<cols;i++){
      const ch=chars[Math.floor(Math.random()*chars.length)];
      ctx.fillStyle=Math.random()>.95?'#00ff41':Math.random()>.65?'#00cc33':'#004010';
      ctx.fillText(ch,i*16,drops[i]*16);
      if(drops[i]*16>H&&Math.random()>.975)drops[i]=0;
      drops[i]++;
    }
  },50);
})();

// HEX GRID
(function(){
  const c=document.getElementById('hex-canvas');
  const ctx=c.getContext('2d');
  function draw(){
    c.width=innerWidth;c.height=innerHeight;
    const r=28,h=r*Math.sqrt(3);
    ctx.strokeStyle='rgba(0,200,50,1)';ctx.lineWidth=0.5;
    for(let col=0;col*r*1.5<innerWidth+r*2;col++){
      for(let row=0;row*h<innerHeight+h;row++){
        const x=col*r*1.5;
        const y=row*h+(col%2)*h/2;
        ctx.beginPath();
        for(let i=0;i<6;i++){
          const a=Math.PI/180*(60*i-30);
          i===0?ctx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));
        }
        ctx.closePath();ctx.stroke();
      }
    }
  }
  draw();addEventListener('resize',draw);
})();
</script>
</body>
</html>
