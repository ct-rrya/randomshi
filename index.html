<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>random.exe</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --green: #39ff14;
      --dim-green: #1a7a06;
      --red: #ff2d55;
      --white: #e8e8e8;
      --card-bg: #0d0d14;
      --card-border: rgba(57,255,20,0.25);
      --card-hover: rgba(57,255,20,0.12);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
      /* Allow scrolling on mobile */
      -webkit-overflow-scrolling: touch;
    }

    /* CRT scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Dot grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(57,255,20,0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px 64px;
      /* Safe area insets for notched phones */
      padding-top: max(48px, env(safe-area-inset-top) + 24px);
      padding-bottom: max(64px, env(safe-area-inset-bottom) + 24px);
      padding-left: max(20px, env(safe-area-inset-left) + 16px);
      padding-right: max(20px, env(safe-area-inset-right) + 16px);
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.8s ease both;
      width: 100%;
      max-width: 580px;
    }

    .title-wrap {
      position: relative;
      display: inline-flex;
      align-items: flex-end;
      margin-bottom: 22px;
    }

    .title {
      font-family: 'VT323', monospace;
      font-size: clamp(52px, 18vw, 120px);
      color: var(--green);
      letter-spacing: clamp(2px, 1vw, 4px);
      line-height: 1;
      text-shadow:
        0 0 12px rgba(57,255,20,0.8),
        0 0 40px rgba(57,255,20,0.3),
        0 0 80px rgba(57,255,20,0.1);
      position: relative;
      /* Prevent text overflow on small screens */
      word-break: break-word;
    }

    .title::before,
    .title::after {
      content: 'random.exe';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
    }
    .title::before {
      color: #ff2d55;
      clip-path: polygon(0 20%, 100% 20%, 100% 35%, 0 35%);
      animation: glitch-r 4s infinite steps(1);
    }
    .title::after {
      color: #00f5ff;
      clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
      animation: glitch-b 4s 0.5s infinite steps(1);
    }

    .cursor {
      display: inline-block;
      width: clamp(6px, 2vw, 14px);
      height: clamp(42px, 13vw, 92px);
      background: var(--green);
      margin-left: 4px;
      flex-shrink: 0;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 10px var(--green);
    }

    .subtitle {
      font-family: 'Silkscreen', monospace;
      font-size: clamp(10px, 3vw, 13px);
      color: rgba(232,232,232,0.5);
      letter-spacing: clamp(1px, 0.5vw, 2px);
      line-height: 1.85;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 20px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02);
      position: relative;
      /* Better text wrapping on mobile */
      word-break: break-word;
      hyphens: auto;
    }

    .subtitle::before {
      content: '// WARNING';
      position: absolute;
      top: -10px;
      left: 14px;
      font-size: 9px;
      color: var(--red);
      background: var(--bg);
      padding: 0 6px;
      letter-spacing: 3px;
    }

    .subtitle em {
      color: var(--red);
      font-style: normal;
      font-weight: 700;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(200px, 100%), 1fr));
      gap: 10px;
      width: 100%;
      max-width: 900px;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    /* Mobile: always 2 columns */
    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
    }

    /* Very small screens: single column for readability */
    @media (max-width: 320px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .btn-box {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: clamp(14px, 4vw, 20px) clamp(12px, 3.5vw, 18px) clamp(12px, 3.5vw, 16px);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      cursor: pointer;
      text-decoration: none;
      color: var(--white);
      /* Smooth transitions — reduced on mobile for performance */
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      overflow: hidden;
      outline: none;
      /* Minimum touch target size */
      min-height: 80px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--card-hover), transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    /* Hover — desktop only */
    @media (hover: hover) {
      .btn-box:hover {
        background: rgba(13,13,20,0.95);
        border-color: var(--green);
        transform: translateY(-3px);
        box-shadow: 0 0 20px rgba(57,255,20,0.15), inset 0 0 30px rgba(57,255,20,0.03);
      }
      .btn-box:hover::before { opacity: 1; }
      .btn-box:hover .btn-label::after {
        content: ' _';
        animation: blink 0.7s step-end infinite;
      }
      .btn-box:hover .btn-arrow {
        color: var(--green);
        letter-spacing: 4px;
      }
      .btn-box:hover::after { opacity: 1; }
    }

    /* Active state for mobile tap feedback */
    .btn-box:active {
      transform: scale(0.97);
      background: rgba(57,255,20,0.06);
      border-color: var(--green);
    }

    .btn-num {
      font-family: 'VT323', monospace;
      font-size: clamp(9px, 2.5vw, 11px);
      color: var(--dim-green);
      letter-spacing: 3px;
      line-height: 1;
    }

    .btn-label {
      font-family: 'VT323', monospace;
      font-size: clamp(20px, 5.5vw, 26px);
      color: var(--green);
      letter-spacing: 1px;
      line-height: 1.15;
      text-shadow: 0 0 8px rgba(57,255,20,0.4);
      position: relative;
      z-index: 1;
      /* Wrap long labels on small screens */
      word-break: break-word;
    }

    .btn-arrow {
      font-size: clamp(10px, 2.5vw, 12px);
      color: rgba(57,255,20,0.4);
      letter-spacing: 2px;
      margin-top: 4px;
      transition: color 0.2s, letter-spacing 0.2s;
    }

    /* Noise texture on hover */
    .btn-box::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 120px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 40px;
      font-size: clamp(9px, 2.5vw, 11px);
      color: rgba(255,255,255,0.15);
      letter-spacing: clamp(1px, 0.5vw, 3px);
      text-align: center;
      animation: fadeUp 1s 0.6s ease both;
      padding: 0 16px;
    }

    /* ── KEYFRAMES ── */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes glitch-r {
      0%, 90%, 100% { transform: translateX(0); opacity: 0; }
      92% { transform: translateX(-4px); opacity: 0.7; }
      94% { transform: translateX(4px); opacity: 0.5; }
      96% { transform: translateX(-2px); opacity: 0.7; }
      98% { transform: translateX(0); opacity: 0; }
    }

    @keyframes glitch-b {
      0%, 88%, 100% { transform: translateX(0); opacity: 0; }
      90% { transform: translateX(3px); opacity: 0.6; }
      92% { transform: translateX(-3px); opacity: 0.4; }
      94% { transform: translateX(1px); opacity: 0.6; }
      96% { transform: translateX(0); opacity: 0; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Stagger card animations */
    .btn-box:nth-child(1)  { animation: fadeUp 0.5s 0.30s ease both; }
    .btn-box:nth-child(2)  { animation: fadeUp 0.5s 0.36s ease both; }
    .btn-box:nth-child(3)  { animation: fadeUp 0.5s 0.42s ease both; }
    .btn-box:nth-child(4)  { animation: fadeUp 0.5s 0.48s ease both; }
    .btn-box:nth-child(5)  { animation: fadeUp 0.5s 0.54s ease both; }
    .btn-box:nth-child(6)  { animation: fadeUp 0.5s 0.60s ease both; }
    .btn-box:nth-child(7)  { animation: fadeUp 0.5s 0.66s ease both; }
    .btn-box:nth-child(8)  { animation: fadeUp 0.5s 0.72s ease both; }
    .btn-box:nth-child(9)  { animation: fadeUp 0.5s 0.78s ease both; }
    .btn-box:nth-child(10) { animation: fadeUp 0.5s 0.84s ease both; }

    /* Reduce motion for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <div class="title-wrap">
        <h1 class="title">random.exe</h1><span class="cursor"></span>
      </div>
      <p class="subtitle">
        A curated collection of absolutely <em>unhinged</em> rabbit holes,
        half-finished ideas, and digital miscellany I probably shouldn't have made public.
        <br/><br/>
        <em>proceed at your own risk.</em>
      </p>
    </header>

    <nav class="grid" id="grid"></nav>

    <footer class="footer">
      [[ no refunds. no explanations. no warranty. ]]
    </footer>

  </div>

  <script>
    const pages = [
      { label: "Fake Hacker Terminal", href: "hacker.html" },
      { label: "Fake Facebook Login.", href: "fakebook.html" },
      { label: "Art Appreciation", href: "art.html" },
      { label: "Art Appreciation - Mobile", href: "art-mobile.html" },
      { label: "xxxxxxx", href: "#" },
      { label: "xxxxxxx", href: "#" },
      { label: "xxxxxxx", href: "#" },
      { label: "xxxxxxx", href: "#" },
      { label: "xxxxxxx", href: "#" },
      { label: "xxxxxxx", href: "#" },
    ];

    const grid = document.getElementById("grid");

    pages.forEach((p, i) => {
      const a = document.createElement("a");
      a.href = p.href;
      a.className = "btn-box";
      a.setAttribute("role", "button");
      a.setAttribute("aria-label", p.label);
      a.innerHTML = `
        <span class="btn-num">[ ${String(i + 1).padStart(2, "0")} ]</span>
        <span class="btn-label">${p.label}</span>
        <span class="btn-arrow">→ OPEN</span>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
